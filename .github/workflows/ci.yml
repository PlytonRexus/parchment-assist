name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test on Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Run format check
        run: npm run format:check

      - name: Run tests
        run: npm test -- --coverage --ci

      - name: Upload coverage reports
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  validate:
    name: Run full validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate

  build:
    name: Build extension package
    runs-on: ubuntu-latest
    needs: [test, validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create distribution package
        run: |
          mkdir -p dist
          cp manifest.json dist/
          cp -r src dist/
          cp -r patches dist/
          cp LICENSE dist/
          cp README.md dist/

      - name: Create ZIP archive
        run: |
          cd dist
          zip -r ../parchment-assist.zip .
          cd ..

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-package
          path: parchment-assist.zip
          retention-days: 7

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          VULN_COUNT=$(npm audit --audit-level=high --json | node -e "const d=require('fs').readFileSync(0,'utf8');const j=JSON.parse(d);console.log(Object.keys(j.vulnerabilities||{}).length)")
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "::error::High or critical vulnerabilities found!"
            npm audit --audit-level=high
            exit 1
          fi

  compatibility:
    name: Extension compatibility check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate manifest.json
        run: |
          echo "Validating manifest.json structure..."
          if ! jq empty manifest.json 2>/dev/null; then
            echo "::error::manifest.json is not valid JSON"
            exit 1
          fi

          # Check required fields
          REQUIRED_FIELDS=("manifest_version" "name" "version" "description")
          for field in "${REQUIRED_FIELDS[@]}"; do
            if ! jq -e ".$field" manifest.json > /dev/null; then
              echo "::error::Missing required field: $field"
              exit 1
            fi
          done

          echo "✓ manifest.json is valid"

      - name: Check file structure
        run: |
          echo "Checking required files and directories..."
          REQUIRED_PATHS=("src/" "manifest.json" "LICENSE" "README.md")
          for path in "${REQUIRED_PATHS[@]}"; do
            if [ ! -e "$path" ]; then
              echo "::error::Missing required path: $path"
              exit 1
            fi
          done

          echo "✓ All required files present"

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [test, validate, build, security, compatibility]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.validate.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.compatibility.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✓ All CI checks passed successfully"
