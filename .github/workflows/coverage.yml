name: Test Coverage

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    name: Generate and Report Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage -- --ci

      - name: Generate coverage report
        run: |
          echo "## Test Coverage Report" > coverage-summary.md
          echo "" >> coverage-summary.md
          echo "Coverage generated on $(date)" >> coverage-summary.md
          echo "" >> coverage-summary.md

          # Extract coverage summary
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const fs = require('fs');
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;

              console.log('| Metric | Coverage |');
              console.log('|--------|----------|');
              console.log('| Lines | ' + total.lines.pct + '% |');
              console.log('| Statements | ' + total.statements.pct + '% |');
              console.log('| Functions | ' + total.functions.pct + '% |');
              console.log('| Branches | ' + total.branches.pct + '% |');
            " >> coverage-summary.md
          fi

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            coverage/
            coverage-summary.md
          retention-days: 30

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('coverage/coverage-summary.json')) {
              console.log('No coverage summary found');
              return;
            }

            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const comment = `## 📊 Test Coverage Report

| Metric | Coverage | Status |
|--------|----------|--------|
| Lines | ${total.lines.pct}% | ${total.lines.pct >= 80 ? '✅' : '⚠️'} |
| Statements | ${total.statements.pct}% | ${total.statements.pct >= 80 ? '✅' : '⚠️'} |
| Functions | ${total.functions.pct}% | ${total.functions.pct >= 80 ? '✅' : '⚠️'} |
| Branches | ${total.branches.pct}% | ${total.branches.pct >= 80 ? '✅' : '⚠️'} |

${total.lines.pct < 80 ? '⚠️ **Warning**: Coverage is below 80% threshold' : '✅ Coverage meets or exceeds 80% threshold'}

<details>
<summary>📁 Coverage by File</summary>

\`\`\`
View detailed coverage report in the artifacts
\`\`\`

</details>

*Coverage report generated by GitHub Actions*
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Check coverage thresholds
        run: |
          echo "Checking if coverage meets minimum thresholds..."

          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const fs = require('fs');
              const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = coverage.total;

              const thresholds = {
                lines: 80,
                statements: 80,
                functions: 80,
                branches: 80
              };

              let failed = false;

              Object.keys(thresholds).forEach(key => {
                const actual = total[key].pct;
                const required = thresholds[key];

                if (actual < required) {
                  console.log(\`::error::${key} coverage (${actual}%) is below threshold (${required}%)\`);
                  failed = true;
                } else {
                  console.log(\`✓ ${key} coverage: ${actual}% (threshold: ${required}%)\`);
                }
              });

              if (failed) {
                console.log('::error::Coverage check failed! Please add more tests.');
                process.exit(1);
              } else {
                console.log('✓ All coverage thresholds met!');
              }
            "
          else
            echo "::error::Coverage summary not found"
            exit 1
          fi

      - name: Archive HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: html-coverage-report
          path: coverage/lcov-report/
          retention-days: 30
